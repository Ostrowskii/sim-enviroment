<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecosystem Observer</title>
  </head>
  <body>
    <div id="app">
      <canvas id="world-canvas"></canvas>
      <aside id="debug-panel">
        <h1>Ecosystem Observer</h1>

        <section class="panel-section controls">
          <div class="control-row">
            <button id="pause-btn">Pause</button>
            <button id="restart-btn">Restart</button>
          </div>
          <div class="control-row speed-row">
            <button data-speed="1" class="speed-btn active">1x</button>
            <button data-speed="2" class="speed-btn">2x</button>
            <button data-speed="5" class="speed-btn">5x</button>
          </div>
          <div class="control-row seed-row">
            <label for="seed-input">Seed</label>
            <input id="seed-input" type="number" min="1" step="1" />
          </div>
          <label class="overlay-toggle">
            <input id="overlay-toggle" type="checkbox" />
            Show Debug Overlay
          </label>
        </section>

        <section class="panel-section metrics">
          <h2>Simulation</h2>
          <div class="metric-grid">
            <div>Tick</div>
            <div id="tick-value">0</div>
            <div>Speed</div>
            <div id="speed-value">1x</div>
            <div>Total Deaths</div>
            <div id="deaths-value">0</div>
            <div>Soil Nutrients</div>
            <div id="soil-value">0</div>
            <div>Water Nutrients</div>
            <div id="water-value">0</div>
          </div>
        </section>

        <section class="panel-section populations">
          <h2>Populations / Avg Energy</h2>
          <table>
            <thead>
              <tr>
                <th>Species</th>
                <th>Count</th>
                <th>Avg Energy</th>
              </tr>
            </thead>
            <tbody id="species-table-body"></tbody>
          </table>
        </section>

        <section class="panel-section selected">
          <h2>Selected Entity</h2>
          <pre id="selected-entity">Click an entity on the map.</pre>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
